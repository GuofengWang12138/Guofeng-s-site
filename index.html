    <style>
        /* --- 視頻背景 --- */
        #bg-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;

            filter: brightness(0.5);

            color: #00e6e6;
            border: 2px solid #00e6e6;
            padding: 10px 20px;
            font-family: 'Segoe UI', sans-serif;
            font-weight: bold;
            font-size: 14px;
            letter-spacing: 2px;
            cursor: pointer;
            text-transform: uppercase;
            clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
            transition: all 0.3s ease;
            box-shadow: 0 0 10px rgba(0, 230, 230, 0.2);
        }

        #video-switch-btn:hover {
            background-color: #00e6e6;
            color: #000;
            box-shadow: 0 0 20px rgba(0, 230, 230, 0.8);
        }

        /* --- 手機端適配修正 --- */
        @media (max-width: 768px) {

                right: 20px;
                padding: 8px 15px;

        }

        /* --- 頁腳 --- */
        #my-fixed-footer {

            bottom: 52px;    
            left: 50%;       
            transform: translateX(-50%); 
            z-index: 1000; 
            width: auto;     
            white-space: nowrap;

        }
        
        #my-fixed-footer h2 {

            font-size: 14px;

        #my-fixed-footer a {

        #my-fixed-footer a:hover {

        /* --- 導航欄 --- */

            font-weight: bold !important; 
            letter-spacing: 1px;

    <script>
        const videos = [
            'Home Page/bg1.mp4', 
            'Home Page/bg2.mp4', 
            'Home Page/bg3.mp4', 
            'Home Page/bg4.mp4',
            'Home Page/bg5.mp4',
            'Home Page/bg6.mp4'
        ];
        
        let currentVideoIndex = 0;
        const videoElement = document.getElementById('bg-video');
        const switchBtn = document.getElementById('video-switch-btn');

        function switchBackground() {
            currentVideoIndex = (currentVideoIndex + 1) % videos.length;
            switchBtn.innerText = "加載中...";
            switchBtn.style.background = '#fff';
            switchBtn.style.color = '#000';
            
            // 強制暫停並重新加載源，這對手機端切換非常重要
            videoElement.pause();
            videoElement.src = videos[currentVideoIndex];
            videoElement.load(); // 顯式調用 load 確保更換生效
            
            // 使用 Promise 處理播放，防止手機端攔截自動播放
            let playPromise = videoElement.play();
            
            if (playPromise !== undefined) {
                playPromise.then(_ => {
                    switchBtn.innerText = "更換背景";
                    switchBtn.style.background = 'transparent';
                    switchBtn.style.color = '#00e6e6';
                }).catch(error => {
                    console.log("切換失敗: ", error);
                    switchBtn.innerText = "更換背景";
                });
            }
        }
    </script>
