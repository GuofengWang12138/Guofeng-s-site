<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wang Guofeng | Personal Website</title>
    <link rel="stylesheet" href="home.css">
    <link rel="shortcut icon" type="image/png" href="favicon.png">
    
    <style>
        /* --- 视频背景样式 --- */
        #bg-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -999;
            filter: brightness(0.5); /* 亮度调节 */
            transition: opacity 0.5s ease;
        }

        body {
            background-color: #000;
            background-image: none !important;
        }

        /* --- 赛博朋克切换按钮样式 --- */
        #video-switch-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 100;
            background-color: transparent;
            color: #00e6e6;
            border: 2px solid #00e6e6;
            padding: 10px 20px;
            font-family: 'Segoe UI', sans-serif;
            font-weight: bold;
            font-size: 14px;
            letter-spacing: 2px;
            cursor: pointer;
            text-transform: uppercase;
            
            /* 切角效果 */
            clip-path: polygon(
                10px 0, 100% 0, 
                100% calc(100% - 10px), 
                calc(100% - 10px) 100%, 
                0 100%, 0 10px
            );
            
            transition: all 0.3s ease;
            box-shadow: 0 0 10px rgba(0, 230, 230, 0.2);
        }

        #video-switch-btn:hover {
            background-color: #00e6e6;
            color: #000;
            box-shadow: 0 0 20px rgba(0, 230, 230, 0.8);
        }

        #video-switch-btn:active {
            transform: scale(0.95);
        }
    </style>
</head>

<body>

    <video autoplay muted loop playsinline id="bg-video">
        <source src="Home Page/bg1.mp4" type="video/mp4">
    </video>

    <button id="video-switch-btn" onclick="switchBackground()">
        SWITCH REALITY_
    </button>

    </div>

    <div class="text_header">
        <h1 class="glitch" style="font-family: 'Segoe UI', 'PingFang SC', sans-serif; font-weight: 600; letter-spacing: 3px; text-shadow: 0 0 5px rgba(0, 230, 230, 0.8); color: #ffffff;" data-text="你好，我是王国峰">你好，我是王国峰</h1>
    </div>

    <div class="tagline">

    <div class="social_container">

            <div class="github">

            </div>
            <div class="youtube">

    <div class="footer">

    <script>
        // 修改点 2: 数组里的路径都加上了 "Home Page/"
        // 注意：文件夹名字中间有空格，代码里也要保留空格
        const videos = [
            'Home Page/bg1.mp4', 
            'Home Page/bg2.mp4', 
            'Home Page/bg3.mp4', 
            'Home Page/bg4.mp4'
        ];
        
        let currentVideoIndex = 0;
        const videoElement = document.getElementById('bg-video');
        const switchBtn = document.getElementById('video-switch-btn');

        function switchBackground() {
            currentVideoIndex = (currentVideoIndex + 1) % videos.length;
            
            // 按钮闪烁特效
            switchBtn.innerText = "LOADING...";
            switchBtn.style.backgroundColor = "#fff";
            switchBtn.style.color = "#000"; // 闪烁时文字变黑
            
            setTimeout(() => {
                // 切换视频
                videoElement.src = videos[currentVideoIndex];
                videoElement.play();
                
                // 恢复按钮状态
                switchBtn.innerText = "SWITCH REALITY_";
                switchBtn.style.backgroundColor = "transparent";
                switchBtn.style.color = "#00e6e6"; // 恢复文字青色
                
                console.log("Switched to: " + videos[currentVideoIndex]);
            }, 100);
        }
    </script>
    
    <script src="main.js"></script>
