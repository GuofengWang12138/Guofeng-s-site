<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wang Guofeng | Personal Website</title>
    <link rel="stylesheet" href="home.css">
    <link rel="shortcut icon" type="image/png" href="favicon.png">
    
    <style>
        /* --- 1. 视频背景 --- */
        #bg-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -999;
            filter: brightness(0.5); 
            transition: opacity 0.5s ease;
        }

        body {
            background-color: #000;
            background-image: none !important;
            margin: 0;
            overflow-x: hidden;
        }

        /* --- 2. 切换按钮 --- */
        #video-switch-btn {
            position: fixed !important;
            bottom: 40px !important;    
            right: 40px !important;     
            z-index: 2147483647 !important; 
            
            background-color: transparent !important;
            color: #00e6e6 !important;
            border: 2px solid #00e6e6 !important;
            padding: 10px 20px !important;
            
            font-family: 'Segoe UI', sans-serif;
            font-weight: bold;
            font-size: 14px;
            letter-spacing: 2px;
            cursor: pointer;
            text-transform: uppercase;
            
            clip-path: polygon(
                10px 0, 100% 0, 
                100% calc(100% - 10px), 
                calc(100% - 10px) 100%, 
                0 100%, 0 10px
            );
            
            transition: all 0.3s ease;
            box-shadow: 0 0 10px rgba(0, 230, 230, 0.2);
        }

        #video-switch-btn:hover {
            background-color: #00e6e6 !important;
            color: #000 !important;
            box-shadow: 0 0 20px rgba(0, 230, 230, 0.8) !important;
        }

        #video-switch-btn:active {
            transform: scale(0.95);
        }

        /* --- 3. 页脚 (仿照 About 页面的清爽风格) --- */
        #my-fixed-footer {
            position: fixed !important; 
            bottom: 52px !important;    
            left: 50% !important;       
            transform: translateX(-50%) !important; 
            
            z-index: 2147483647 !important; 
            width: auto !important;     
            white-space: nowrap !important;
            pointer-events: none;       
            
            display: block !important;
            visibility: visible !important;
            opacity: 1 !important;
        }
        
        #my-fixed-footer h2 {
            font-family: 'Segoe UI', 'Helvetica Neue', Helvetica, Arial, sans-serif !important;
            font-size: 14px !important;
            font-weight: normal !important;
            color: #ffffff !important;
            letter-spacing: 1px !important;
            margin: 0 !important;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8); 
            pointer-events: auto; 
        }

        #my-fixed-footer a {
            font-family: 'Segoe UI', sans-serif !important;
            color: #ffffff !important;
            text-decoration: none !important;
            font-weight: normal !important;
            margin-left: 5px;
            transition: color 0.3s ease;
        }

        #my-fixed-footer a:hover {
            color: #00e6e6 !important;
            text-decoration: underline !important;
        }

        /* --- 4. 顶部导航栏 (新增：黑体设置) --- */
        .nav-wrapper ul li a {
            /* 强制使用微软雅黑/黑体 */
            font-family: "Microsoft YaHei", "SimHei", "Heiti SC", sans-serif !important;
            font-weight: bold !important; /* 加粗，对应“黑体”的视觉感 */
            letter-spacing: 1px; /* 稍微加点间距更好看 */
        }
    </style>
</head>

<body>

    <video autoplay muted loop playsinline id="bg-video">
        <source src="Home Page/bg1.mp4" type="video/mp4">

    <button id="video-switch-btn" onclick="switchBackground()">
        更换背景

                    <li><a href="about.html">关于我</a></li>
                    <li><a href="projects.html">个人日志</a></li>
                    <li><a href="Pathum_D_2021_resume.pdf" target="_blank">个人履历</a></li>
                </ul>
            </div>
        </nav>
    </div>

    <div class="text_header">
        <h1 class="glitch" style="font-family: 'Segoe UI', 'PingFang SC', sans-serif; font-weight: 600; letter-spacing: 3px; text-shadow: 0 0 5px rgba(0, 230, 230, 0.8); color: #ffffff;" data-text="你好，我是王国峰">你好，我是王国峰</h1>
    </div>

    <div class="tagline">
        <h2>数据标注项目经理 | 自动驾驶 · 多模态大模型 · 内容质量</h2>
    </div>

    <div class="button_container">
        <a href="Pathum_D_2021_resume.pdf" target="_blank"><button type="button">个人履历</button></a>
    </div>

    <div class="social_container">
        <div class="social_box">
            <img src="Home Page/social box.svg" draggable="false">
        </div>
        <div class="icons_container">
            <div class="github">
                <img src="About Page/github_black.svg" alt="github" draggable="false" onclick="window.open('https://github.com/GuofengWang12138', '_blank');" />
            </div>
            <div class="youtube">
                <img src="About Page/youtube_black.svg" alt="Youtube" draggable="false" onclick="window.open('https://www.youtube.com/channel/UCwBEcY77KvSDHY8fWgY8gqg', '_blank');" />
            </div>
            <div class="instagram">

            </div>
            <div class="linkedin">

    <div id="my-fixed-footer">
        <h2>请联系我：<a href="mailto:Rohanwang12138@gmail.com">Rohanwang12138@gmail.com</a></h2>
    </div>

    <script>
        const videos = [
            'Home Page/bg1.mp4', 
            'Home Page/bg2.mp4', 
            'Home Page/bg3.mp4', 
            'Home Page/bg4.mp4',
            'Home Page/bg5.mp4',
            'Home Page/bg6.mp4'
        ];
        
        let currentVideoIndex = 0;
        const videoElement = document.getElementById('bg-video');
        const switchBtn = document.getElementById('video-switch-btn');

        function switchBackground() {
            currentVideoIndex = (currentVideoIndex + 1) % videos.length;
            
            switchBtn.innerText = "加载中...";
            switchBtn.style.setProperty('background-color', '#fff', 'important');
            switchBtn.style.setProperty('color', '#000', 'important');
            
            setTimeout(() => {
                videoElement.src = videos[currentVideoIndex];
                videoElement.play();
                
                switchBtn.innerText = "更换背景";
                switchBtn.style.setProperty('background-color', 'transparent', 'important');
                switchBtn.style.setProperty('color', '#00e6e6', 'important');
                
                console.log("Switched to: " + videos[currentVideoIndex]);
            }, 100);
        }
    </script>
    
    <script src="main.js"></script>

</body>
</html>
