            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .card:hover {
            transform: translateY(-10px);
            background: rgba(255, 255, 255, 0.12);
            border-color: #e74c3c;
            box-shadow: 0 15px 30px rgba(231, 76, 60, 0.2);
        }
        .card img {
            width: 48px;
            height: 48px;
            margin-bottom: 15px;
            filter: invert(1);
        }
        .card span {

            font-size: 14px;
            font-weight: bold;
        }

        @media (max-width: 768px) {
            .skill-category { width: 90%; } /* 手机上可以宽一点 */
            .grid-box { grid-template-columns: repeat(2, 1fr); gap: 10px; }

<script>
    var counter = document.querySelector(".percent");
    function progress() {
        var windowScrollTop = $(window).scrollTop();
        var docHeight = $(document).height();
        var windowHeight = $(window).height();
        var progress = (windowScrollTop / (docHeight - windowHeight)) * 100;
        var $bgColor = progress > 99 ? "#fff" : "#fff";
        var $textColor = progress > 99 ? "#fff" : "#333";
        $("h3").text(Math.round(progress) + "%").css({ color: $textColor });
        $(".fill").height(progress + "%").css({ backgroundColor: $bgColor });
    }
    progress();
    $(document).on("scroll", progress);
</script>
